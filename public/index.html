<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>AI Tutor</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 16px; }
    #chat {
      border: 1px solid #ccc;
      padding: 12px;
      height: 60vh;
      overflow-y: auto;
      background: #fafafa;
      margin-bottom: 12px;
      white-space: pre-wrap;
    }
    #chat a {
  text-decoration: underline;
  cursor: pointer;
}
    .msg { margin: 8px 0; }
    .student { font-weight: bold; }
    .tutor { font-weight: bold; }
    .row { display: flex; gap: 8px; }
    #messageInput { flex: 1; padding: 10px; }
    #sendBtn { padding: 10px 14px; }
    #loginPanel {
      max-width: 360px;
      border: 1px solid #ccc;
      padding: 16px;
      background: #fafafa;
    }
    #loginPanel label {
      display: block;
      margin-bottom: 10px;
    }
    #loginPanel input {
      box-sizing: border-box;
      display: block;
      width: 100%;
      padding: 10px;
      margin-top: 4px;
    }
    #loginError {
      color: #b00020;
      min-height: 20px;
      margin: 8px 0;
    }
    #tutorApp { display: none; }
  </style>
</head>
<body>

  <h1>AI Tutor</h1>

  <div id="loginPanel">
    <form id="loginForm">
      <label>
        Username
        <input type="text" id="usernameInput" autocomplete="username" required />
      </label>
      <label>
        Password
        <input type="password" id="passwordInput" autocomplete="current-password" required />
      </label>
      <div id="loginError"></div>
      <button id="loginBtn" type="submit">Log in</button>
    </form>
  </div>

  <div id="tutorApp">
  <div class="row" style="margin-bottom: 12px;">
  <label>
    Subject:
    <select id="subjectSelect">
      <option value="maths">Maths</option>
      <option value="english">English</option>
    </select>
  </label>
</div>

  <div id="chat"></div>
  <div class="row" style="margin-bottom: 12px;">
    <label>
      Half Term:
      <select id="htSelect" disabled>
        <option value="">Select…</option>
      </select>
    </label>

    <label>
      Lesson:
      <select id="lessonSelect" disabled>
        <option value="">Select…</option>
      </select>
    </label>

    <label>
      Week:
      <select id="weekSelect" disabled>
        <option value="">Select…</option>
      </select>
    </label>
  </div>
<div class="row" style="margin-bottom: 12px;">
  <button id="confirmLessonBtn" disabled>
    Confirm lesson
  </button>
</div>

  <div class="row">
    <input type="text" id="messageInput" placeholder="Type your message here" />
    <button id="sendBtn">Send</button>
  </div>

<script>
  // Load history from sessionStorage (survives refresh in this tab)
    // Derive tenant from URL: /UnityCollege, /CCA, etc.
  function getPathTenant() {
    return location.pathname.split("/").filter(Boolean)[0] || "";
  }
  function normalizeTenant(value) {
    return String(value || "").trim().toLowerCase();
  }
  let currentAuth = JSON.parse(sessionStorage.getItem("tutor_auth") || "null");
  let currentStudent = currentAuth?.student || null;
  let history = JSON.parse(sessionStorage.getItem("tutor_history") || "[]");

  const loginPanel = document.getElementById("loginPanel");
  const tutorApp = document.getElementById("tutorApp");
  const loginForm = document.getElementById("loginForm");
  const usernameInput = document.getElementById("usernameInput");
  const passwordInput = document.getElementById("passwordInput");
  const loginError = document.getElementById("loginError");
  const loginBtn = document.getElementById("loginBtn");

  const chatEl = document.getElementById("chat");
  const inputEl = document.getElementById("messageInput");
  const sendBtn = document.getElementById("sendBtn");
  // --- Dropdowns: HT + Lesson (+ optional Week fallback) ---
  let curriculumIndex = null;
  const htSelect = document.getElementById("htSelect");
  const lessonSelect = document.getElementById("lessonSelect");
  const weekSelect = document.getElementById("weekSelect");
  const subjectSelect = document.getElementById("subjectSelect");

  function clearAuthState() {
    sessionStorage.removeItem("tutor_auth");
    sessionStorage.removeItem("tutor_student");
    currentAuth = null;
    currentStudent = null;
  }

  function hasValidCurrentAuth() {
    return (
      currentAuth &&
      normalizeTenant(currentAuth.tenant) === normalizeTenant(getPathTenant()) &&
      typeof currentAuth.session_token === "string" &&
      currentAuth.session_token &&
      Number.isFinite(Number(currentAuth.expires_at)) &&
      Date.now() < Number(currentAuth.expires_at) &&
      currentStudent?.username
    );
  }

  function buildAuthHeaders(extraHeaders = {}) {
    return {
      ...extraHeaders,
      "x-session-token": currentAuth?.session_token || "",
    };
  }

  async function readErrorMessage(res, fallback) {
    try {
      const data = await res.json();
      if (data && typeof data.error === "string" && data.error.trim()) {
        return data.error.trim();
      }
    } catch {}
    return fallback;
  }

  async function loadCurriculumIndex() {
const res = await fetch(`/${getPathTenant()}/api/curriculum/index?subject=${encodeURIComponent(subjectSelect.value)}&year=Yr9`, {
  headers: buildAuthHeaders()
});
    if (res.status === 401 || res.status === 403) {
      const authError = await readErrorMessage(res, "Your session has expired. Please log in again.");
      clearAuthState();
      throw new Error(authError);
    }
    if (!res.ok) throw new Error("Failed to load curriculum index");
    curriculumIndex = await res.json();

    // Populate HT dropdown
    htSelect.innerHTML = `<option value="">Select…</option>`;
    Object.keys(curriculumIndex)
      .sort((a, b) => a.localeCompare(b))
      .forEach((ht) => {
        const opt = document.createElement("option");
        opt.value = ht;        // e.g. "HT1"
        opt.textContent = ht;  // display
        htSelect.appendChild(opt);
      });
  }

  function refreshWeeksForSelectedHT() {
    const ht = htSelect.value;
    weekSelect.innerHTML = `<option value="">Select…</option>`;

        // If HT dropdown is disabled, Week must stay disabled too
    if (htSelect.disabled) {
      weekSelect.disabled = true;
      return;
    }

    if (!ht || !curriculumIndex?.[ht]) {
      weekSelect.disabled = true;
      return;
    }

    // Populate Week dropdown from index
    curriculumIndex[ht].weeks.forEach((wKey) => {
      const opt = document.createElement("option");
      opt.value = wKey;       // e.g. "W2"
      opt.textContent = wKey;
      weekSelect.appendChild(opt);
    });

    weekSelect.disabled = false;
  }

  function refreshLessonsForSelectedHT() {
    const ht = htSelect.value;
    lessonSelect.innerHTML = `<option value="">Select…</option>`;

    if (htSelect.disabled) {
      lessonSelect.disabled = true;
      return;
    }

    const lessons = curriculumIndex?.[ht]?.lessons;
    if (!ht || !Array.isArray(lessons) || lessons.length === 0) {
      lessonSelect.disabled = true;
      return;
    }

    lessons.forEach((item) => {
      const opt = document.createElement("option");
      opt.value = `W${item.week}|L${item.lesson}`;
      const outcomes = Array.isArray(item.learning_outcomes) ? item.learning_outcomes : [];
      const shortOutcomes = outcomes.slice(0, 2);
      const extraCount = Math.max(0, outcomes.length - shortOutcomes.length);
      const summary = shortOutcomes.length
        ? `${shortOutcomes.join(" | ")}${extraCount > 0 ? ` (+${extraCount} more)` : ""}`
        : (item.label || "Untitled lesson");
      opt.textContent = `W${item.week} L${item.lesson} — ${summary}`;
      if (outcomes.length) {
        opt.title = outcomes.join("\n");
      }
      lessonSelect.appendChild(opt);
    });

    lessonSelect.disabled = false;
  }

  htSelect.addEventListener("change", () => {
    refreshWeeksForSelectedHT();
    refreshLessonsForSelectedHT();
    saveDropdownState();
    updateConfirmButtonState();
  });
  // Persist dropdown selections in this tab (survives refresh)
  function saveDropdownState() {
  sessionStorage.setItem("selected_subject", subjectSelect.value || "maths");
  sessionStorage.setItem("selected_ht", htSelect.value || "");
  sessionStorage.setItem("selected_lesson", lessonSelect.value || "");
  sessionStorage.setItem("selected_week", weekSelect.value || "");
}

  function restoreDropdownState() {
  const savedSubject = sessionStorage.getItem("selected_subject") || "maths";
  const savedHT = sessionStorage.getItem("selected_ht") || "";
  const savedLesson = sessionStorage.getItem("selected_lesson") || "";
  const savedWeek = sessionStorage.getItem("selected_week") || "";

  subjectSelect.value = savedSubject;

  if (savedHT) htSelect.value = savedHT;
  refreshWeeksForSelectedHT();
  refreshLessonsForSelectedHT();

  if (savedLesson) lessonSelect.value = savedLesson;
  if (savedWeek) weekSelect.value = savedWeek;
}

  // Save whenever the user changes Lesson or Week
  lessonSelect.addEventListener("change", () => {
    saveDropdownState();
    updateConfirmButtonState();
  });
  weekSelect.addEventListener("change", () => {
    saveDropdownState();
    updateConfirmButtonState();
  });
  subjectSelect.addEventListener("change", async () => {
  try {
    htSelect.value = "";
    lessonSelect.innerHTML = `<option value="">Select…</option>`;
    lessonSelect.disabled = true;
    weekSelect.innerHTML = `<option value="">Select…</option>`;
    weekSelect.disabled = true;
    saveDropdownState();
    await loadCurriculumIndex();
    updateConfirmButtonState();
  } catch (e) {
    console.error("Subject change load error:", e);
  }
});
  const confirmLessonBtn = document.getElementById("confirmLessonBtn");

  function updateConfirmButtonState() {
    const htSelected = !!htSelect.value;
    const lessonSelected = !!lessonSelect.value;

    confirmLessonBtn.disabled = !(htSelected && lessonSelected);
  }

  // Update button state whenever dropdowns change
  lessonSelect.addEventListener("change", updateConfirmButtonState);

  // Also update after restoring dropdown state
  updateConfirmButtonState();

  async function startTutorApp() {
    loginPanel.style.display = "none";
    tutorApp.style.display = "block";

  try {
    const savedSubject = sessionStorage.getItem("selected_subject") || "maths";
    subjectSelect.value = savedSubject;
    await loadCurriculumIndex();
    restoreDropdownState();

  } catch (e) {
    console.error("Dropdown load error:", e);
  }
  }

  loginForm.addEventListener("submit", async (e) => {
    e.preventDefault();

    loginError.textContent = "";
    loginBtn.disabled = true;

    try {
      const res = await fetch(`/${getPathTenant()}/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          username: usernameInput.value.trim(),
          password: passwordInput.value,
        }),
      });

      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(data.error || "Login failed.");
      }

      if (
        typeof data.session_token !== "string" ||
        !data.session_token ||
        !Number.isFinite(Number(data.expires_at))
      ) {
        throw new Error("Login response is missing session details. Please restart the server and try again.");
      }

      currentAuth = {
        tenant: data.tenant,
        student: data.student,
        session_token: data.session_token,
        expires_at: data.expires_at,
      };
      currentStudent = currentAuth.student;
      sessionStorage.setItem("tutor_auth", JSON.stringify(currentAuth));
      sessionStorage.removeItem("tutor_student");
      passwordInput.value = "";
      await startTutorApp();
    } catch (err) {
      loginError.textContent = err.message;
      passwordInput.value = "";
      passwordInput.focus();
    } finally {
      loginBtn.disabled = false;
    }
  });

  // Load tutor only after a successful login in this browser tab
  window.addEventListener("DOMContentLoaded", async () => {
    if (hasValidCurrentAuth()) {
      await startTutorApp();
    } else {
      clearAuthState();
      loginPanel.style.display = "block";
      tutorApp.style.display = "none";
      usernameInput.focus();
    }
  });

  function escapeHtml(str) {
    return String(str)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }
function looksLikePersonalInfo(text) {
  const t = String(text || "");

  // Email addresses
  const emailLike = /\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}\b/i.test(t);

  // UK-ish phone patterns (rough)
  const phoneLike =
    /\b(\+?44\s?7\d{3}|\(?07\d{3}\)?)\s?\d{3}\s?\d{3}\b/.test(t) ||   // mobiles
    /\b0\d{3,4}\s?\d{3}\s?\d{3,4}\b/.test(t);                        // landlines-ish

  return emailLike || phoneLike;
}

  function addMessage(who, text) {
    const div = document.createElement("div");
    div.className = "msg";
    div.dataset.who = who;

    if (who === "student") {
      div.innerHTML = '<span class="student">student:</span> ' + escapeHtml(text);
    } else {
      div.innerHTML = '<span class="tutor">tutor:</span> ' + escapeHtml(text);
    }

    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  // Optional: redraw existing history on load (comment out if you don't want it)
  // for (const m of history) addMessage(m.role === "user" ? "student" : "tutor", m.content);

  async function sendMessage() {
    if (!hasValidCurrentAuth()) {
      clearAuthState();
      loginPanel.style.display = "block";
      tutorApp.style.display = "none";
      usernameInput.focus();
      return;
    }

    const message = inputEl.value.trim();
    if (!message) return;
// Client-side safeguard: block obvious personal details
if (looksLikePersonalInfo(message)) {
  addMessage(
    "tutor",
    "Please don’t share personal details (like phone numbers or email addresses). You can rephrase your question without them."
  );
  inputEl.value = "";
  inputEl.focus();
  return;
}

    // show student message immediately
        // show student message immediately (unless it's an internal auto message)
    const isAutoMessage = message === "start";
    if (!isAutoMessage) addMessage("student", message);
    const loadingEl = addMessage("tutor", "...");
    inputEl.value = "";
    inputEl.focus();

    try {
           // Build curriculum_pointer from dropdowns (lesson-first, week optional fallback)
      const ht = document.getElementById("htSelect")?.value;       // e.g. "HT3"
      const lessonToken = document.getElementById("lessonSelect")?.value; // e.g. "W5|L9"
      const wKey = document.getElementById("weekSelect")?.value;   // e.g. "W2"

      const tokenMatch = lessonToken ? lessonToken.match(/^W(\d+)\|L(\d+)$/i) : null;
      const lessonNo = tokenMatch ? Number(tokenMatch[2]) : null;
      const weekFromLesson = tokenMatch ? Number(tokenMatch[1]) : null;
      const weekNo = wKey ? Number(wKey.replace("W", "")) : null;
      const curriculum_pointer =
        ht && Number.isInteger(lessonNo)
          ? {
              ht,
              lesson: lessonNo,
              ...(Number.isInteger(weekFromLesson)
                ? { week: weekFromLesson }
                : (Number.isInteger(weekNo) ? { week: weekNo } : {})),
            }
          : null;

      const payload = {
        message,
        history,
        ...(curriculum_pointer ? { curriculum_pointer } : {})
      };

      console.log("PAYLOAD TO /tutor:\n", JSON.stringify(payload, null, 2));
      console.log("Last history item:", history[history.length - 1]);

          const res = await fetch(`/${getPathTenant()}/tutor`, {
  method: "POST",
  headers: buildAuthHeaders({
    "Content-Type": "application/json",
    "x-subject": subjectSelect.value
  }),
  body: JSON.stringify(payload)
});

      if (res.status === 401 || res.status === 403) {
        const authError = await readErrorMessage(res, "Your session has expired. Please log in again.");
        clearAuthState();
        throw new Error(authError);
      }

      if (!res.ok) throw new Error("Server error: " + res.status);

      const data = await res.json();

      // update history + persist it
      if (Array.isArray(data.history)) {
        history = data.history;
        sessionStorage.setItem("tutor_history", JSON.stringify(history));
      }

      // show tutor reply
      loadingEl.innerHTML =
  '<span class="tutor">tutor:</span> ' +
  linkify(escapeHtml(data.reply));

  function linkify(escapedText) {
  // escapedText must already be HTML-escaped (we keep it safe)
  const urlRegex = /(https?:\/\/[^\s<]+)/g;
  return String(escapedText).replace(urlRegex, (url) => {
    return `<a href="${url}" target="_blank" rel="noopener noreferrer">${url}</a>`;
  });
}

            // Unlock dropdowns when server says we're in curriculum menu mode
	      if (data.show_menu === true) {
	        htSelect.disabled = false;
	        refreshWeeksForSelectedHT(); // Week stays disabled until HT is chosen
          refreshLessonsForSelectedHT();
	      }
      chatEl.scrollTop = chatEl.scrollHeight;
            // Auto-continue: if tutor just finished prefs, send a "start" message to begin the lesson
      // Prevent loops by only auto-starting once per prefs completion
      if (String(data.reply || "").includes("[[PREFS_DONE]]")) {
        const alreadyAutoStarted = sessionStorage.getItem("auto_started_after_prefs") === "1";
        if (!alreadyAutoStarted) {
          sessionStorage.setItem("auto_started_after_prefs", "1");
          inputEl.value = "start";
          sendMessage();
          return; // stop here so we don't double-scroll etc.
        }
      } else {
        // Reset the auto-start flag when we're not on the PREFS_DONE message
        sessionStorage.removeItem("auto_started_after_prefs");
      }


    } catch (err) {
      loadingEl.innerHTML =
        '<span class="tutor">tutor:</span> ' +
        escapeHtml("Sorry — I couldn't reach the tutor API. (" + err.message + ")");
        
      chatEl.scrollTop = chatEl.scrollHeight;
      console.error(err);
    }
  }

  sendBtn.addEventListener("click", sendMessage);
    confirmLessonBtn.addEventListener("click", () => {
    // Safety: lesson-first selection
    if (!htSelect.value || !lessonSelect.value) return;

    // Put a short, non-personal selection message into the input and send
    inputEl.value = weekSelect.value
      ? `${htSelect.value} ${weekSelect.value} ${lessonSelect.value}`
      : `${htSelect.value} ${lessonSelect.value}`;
    sendMessage();
  });
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });
</script>

  </div>

</body>
</html>
